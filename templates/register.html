<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Register</h2>

    <!-- Form POST method se register route pe jayega -->
    <form method="POST">

        <!-- Email input -->
        <input type="email" name="email" placeholder="Enter Email" required>

        <!-- Password input -->
        <input type="password" name="password" placeholder="Enter Password" required>

        <!-- Submit button -->
        <button type="submit">Register</button>

    </form>

    <!-- Agar Flask se error message aaya ho -->
    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <!-- Login page link -->
    <div class="link">
        Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>

</div>

</body>
</html>
